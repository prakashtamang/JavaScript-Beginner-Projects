<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Password Generator</h2>
      <div class="input-container">
        <label
          >Password Lenght: <input type="number" id="len" min="6" value="12"
        /></label>

        <label
          ><input type="checkbox" checked id="upper" />Include Upper
        </label>
        <label
          ><input type="checkbox" checked id="nums" />Include Numbers</label
        >
        <label
          ><input type="checkbox" checked id="special" /> Include Special
          Characters</label
        >
      </div>

      <div id="buttons">
        <button id="generate">Generate Password</button>
        <button id="reset">Reset</button>
      </div>
      <p id="password">Your password will appear here</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
